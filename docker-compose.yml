services:
  api:
    build: .
    container_name: saquagaming_api

    ports:
      - "8000:8000"

    env_file:
      - .env.example

    depends_on:
      - db

    volumes:
      - .:/app

  db:
    image: postgres:16

    container_name: saquagaming_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: saquagaming

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: